<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Painel – EducaInclusiva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: #F0F6FF; min-height: 100vh; }

        .topbar {
            background: #0D47A1; padding: 14px 40px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 3px solid #FFD600;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width:44px;height:44px;background:#FFD600;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px; }
        .logo-text { font-family:'Fredoka One',cursive;color:#fff;font-size:26px; }
        .logo-text span { color:#FFD600; }
        .btn-sair { background:#E53935;color:#fff;border:none;padding:9px 20px;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.2s; }
        .btn-sair:hover { background:#B71C1C; }

        .hero {
            background: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
            margin: 28px 40px 0; border-radius: 24px;
            padding: 32px 36px; display: flex; align-items: center; gap: 24px;
            box-shadow: 0 8px 32px rgba(21,101,192,0.18);
        }
        .hero-avatar { width:80px;height:80px;background:#FFD600;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0; }
        .hero-info { flex:1; }
        .hero-nome { font-family:'Fredoka One',cursive;color:#fff;font-size:28px; }
        .hero-condicao { display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;font-weight:800;font-size:13px;margin-top:8px; }
        .cond-nenhuma  { background:#E3F2FD;color:#1565C0; }
        .cond-visual   { background:#FFEBEE;color:#C62828; }
        .cond-auditiva { background:#E8F5E9;color:#1B5E20; }
        .cond-cognitiva{ background:#F3E5F5;color:#4A148C; }
        .cond-fisica   { background:#EFEBE9;color:#3E2723; }
        .cond-outro    { background:#FFF3E0;color:#E65100; }
        .hero-stats { display:flex;gap:16px;flex-wrap:wrap; }
        .stat-box { background:rgba(255,255,255,0.12);border-radius:16px;padding:16px 22px;text-align:center;min-width:88px; }
        .stat-num { font-family:'Fredoka One',cursive;color:#FFD600;font-size:26px; }
        .stat-label { color:#BBDEFB;font-size:12px;font-weight:600;margin-top:4px; }

        .content { padding: 28px 40px 40px; }
        .section-title { font-family:'Fredoka One',cursive;color:#1565C0;font-size:22px;margin-bottom:18px;display:flex;align-items:center;gap:10px; }

        .dados-card { background:#fff;border-radius:20px;padding:24px;box-shadow:0 2px 16px rgba(21,101,192,0.08);border:2px solid #E3F2FD;margin-bottom:28px; }
        .dado-row { display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #F0F6FF; }
        .dado-row:last-child { border-bottom:none; }
        .dado-icon { width:40px;height:40px;border-radius:12px;background:#E3F2FD;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0; }
        .dado-info strong { display:block;color:#1565C0;font-size:13px;font-weight:700; }
        .dado-info span { color:#546E7A;font-size:14px; }

        .progress-section { background:#fff;border-radius:20px;padding:24px;box-shadow:0 2px 16px rgba(21,101,192,0.08);border:2px solid #E3F2FD;margin-bottom:28px; }
        .progress-header { display:flex;justify-content:space-between;font-size:14px;font-weight:700;color:#1565C0;margin-bottom:10px; }
        .progress-bar { width:100%;height:18px;background:#E3F2FD;border-radius:10px;overflow:hidden; }
        .progress-fill { height:100%;background:linear-gradient(90deg,#1565C0,#42A5F5);border-radius:10px;transition:width 1.2s cubic-bezier(.4,0,.2,1); }

        .cards-row { display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;margin-bottom:28px; }
        .info-card { background:#fff;border-radius:20px;padding:24px;box-shadow:0 2px 16px rgba(21,101,192,0.07);border:2px solid #E3F2FD;text-align:center;transition:transform 0.2s; }
        .info-card:hover { transform:translateY(-3px); }
        .card-icon { font-size:36px;margin-bottom:10px; }
        .card-valor { font-family:'Fredoka One',cursive;color:#1565C0;font-size:28px; }
        .card-label { color:#90A4AE;font-size:12px;font-weight:600;margin-top:4px; }

        @media (max-width:768px) {
            .hero { margin:16px;flex-direction:column; }
            .hero-stats { flex-wrap:wrap; }
            .content { padding:16px; }
            .topbar { padding:14px 20px; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-left">
        <div class="logo-icon">🌟</div>
        <div class="logo-text">Educa<span>Inclusiva</span></div>
    </div>
    <button class="btn-sair" onclick="sair()"><i class="ti ti-logout"></i> Sair</button>
</header>

<div class="hero">
    <div class="hero-avatar" id="hero-avatar">🧒</div>
    <div class="hero-info">
        <div class="hero-nome" id="hero-nome">Carregando...</div>
        <div class="hero-condicao" id="hero-condicao">—</div>
    </div>
    <div class="hero-stats">
        <div class="stat-box"><div class="stat-num" id="stat-nivel">—</div><div class="stat-label">Nível</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-pontos">—</div><div class="stat-label">Pontos</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-progresso">—</div><div class="stat-label">Progresso</div></div>
    </div>
</div>

<div class="content" id="conteudo-principal">
    <p style="color:#1565C0;font-weight:700;text-align:center;padding:60px">Carregando seus dados... ⏳</p>
</div>

<script>
    const usuarioLocal = JSON.parse(localStorage.getItem("usuario"));

    if (!usuarioLocal) {
        window.location.href = "index.html";
    } else if (usuarioLocal.tipo !== "aluno") {
        alert("Esta área é exclusiva para alunos.");
        window.location.href = "index.html";
    }

    // ✅ Mapeamento de condição → classe CSS e ícone
    const condicaoConfig = {
        "Nenhuma":   { cls: "cond-nenhuma",   icon: "✅" },
        "Visual":    { cls: "cond-visual",    icon: "👁️" },
        "Auditiva":  { cls: "cond-auditiva",  icon: "👂" },
        "Cognitiva": { cls: "cond-cognitiva", icon: "🧠" },
        "Física":    { cls: "cond-fisica",    icon: "♿" },
        "Fisica":    { cls: "cond-fisica",    icon: "♿" }, // fallback sem acento
        "Outro":     { cls: "cond-outro",     icon: "⭐" }
    };

    // ✅ Normaliza string para comparação (remove acentos, lowercase)
    function normalizar(str) {
        return (str || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    // ✅ Encontra config de condição de forma tolerante a acentos
    function getCondicaoConfig(condicao) {
        // Tenta match direto primeiro
        if (condicaoConfig[condicao]) return condicaoConfig[condicao];
        // Tenta match normalizado
        const norm = normalizar(condicao);
        for (const [key, val] of Object.entries(condicaoConfig)) {
            if (normalizar(key) === norm) return val;
        }
        return { cls: "cond-nenhuma", icon: "✅" };
    }

    async function carregarDadosAluno() {
        try {
            const res   = await fetch(`http://localhost:3000/aluno/${usuarioLocal.id}`);
            const dados = await res.json();

            if (!res.ok) {
                // Servidor offline — usa dados do localStorage
                renderizarPainel(usuarioLocal);
                return;
            }

            // ✅ Prioridade: dado do BANCO (mais atualizado) sobre o localStorage
            const aluno = { ...usuarioLocal, ...dados.aluno };
            localStorage.setItem("usuario", JSON.stringify(aluno));
            renderizarPainel(aluno);

        } catch {
            // Sem conexão — usa localStorage
            renderizarPainel(usuarioLocal);
        }
    }

    function renderizarPainel(aluno) {
        // ✅ Lê condicao diretamente do objeto (vem do banco via server.js)
        const condicao     = aluno.condicao    || "Nenhuma";
        const nivel        = aluno.nivel       || 1;
        const pontos       = aluno.pontos      || 0;
        const progresso    = aluno.progresso   || 0;
        const cpf          = aluno.cpf         || "Não informado";
        const rg           = aluno.rg          || "Não informado";
        const telefone     = aluno.telefone    || "Não informado";
        const serie        = aluno.serie       || "Não informado";
        const tipoEscola   = aluno.tipoEscola  || "Não informado";
        const nivelAutismo = aluno.nivelAutismo ?? 0;
        const email        = aluno.email       || "—";
        const nome         = aluno.nome        || "Aluno";

        const cfg = getCondicaoConfig(condicao);

        // ── Hero ──
        document.getElementById("hero-nome").textContent = "Olá, " + nome + "! 👋";
        document.getElementById("hero-avatar").textContent = "🧒";

        const condEl = document.getElementById("hero-condicao");
        // ✅ Exibe o ícone + nome da condição que veio do banco
        condEl.textContent = cfg.icon + " " + condicao;
        condEl.className   = "hero-condicao " + cfg.cls;

        document.getElementById("stat-nivel").textContent    = "⭐ " + nivel;
        document.getElementById("stat-pontos").textContent   = "🏆 " + pontos;
        document.getElementById("stat-progresso").textContent = progresso + "%";

        // ── Autismo ──
        const autismoDesc = {
            0: { titulo: "Sem diagnóstico TEA",        texto: "Não há indicação de Transtorno do Espectro Autista." },
            1: { titulo: "Nível 1 – Suporte Leve",     texto: "Suporte leve com algumas dificuldades de comunicação." },
            2: { titulo: "Nível 2 – Suporte Moderado", texto: "Suporte moderado com dificuldades marcantes." }
        };
        const descAutismo = autismoDesc[nivelAutismo] || autismoDesc[0];

        // ── Conteúdo principal ──
        document.getElementById("conteudo-principal").innerHTML = `
            <div class="section-title">
                <i class="ti ti-id-badge" style="color:#1565C0"></i> Meus Dados Pessoais
            </div>

            <div class="dados-card">
                <div class="dado-row">
                    <div class="dado-icon">👤</div>
                    <div class="dado-info"><strong>Nome completo</strong><span>${nome}</span></div>
                </div>
                <div class="dado-row">
                    <div class="dado-icon">📧</div>
                    <div class="dado-info"><strong>E-mail</strong><span>${email}</span></div>
                </div>
                <div class="dado-row">
                    <div class="dado-icon">🪪</div>
                    <div class="dado-info"><strong>CPF</strong><span>${cpf}</span></div>
                </div>
                <div class="dado-row">
                    <div class="dado-icon">📋</div>
                    <div class="dado-info"><strong>RG</strong><span>${rg}</span></div>
                </div>
                <div class="dado-row">
                    <div class="dado-icon">📱</div>
                    <div class="dado-info"><strong>Telefone</strong><span>${telefone}</span></div>
                </div>
                <div class="dado-row">
                    <div class="dado-icon">📚</div>
                    <div class="dado-info"><strong>Série/Ano</strong><span>${serie}</span></div>
                </div>
                <div class="dado-row">
                    <div class="dado-icon">🏫</div>
                    <div class="dado-info"><strong>Tipo de Escola</strong><span>${tipoEscola}</span></div>
                </div>
                <!-- ✅ Tipo de necessidade exibido aqui -->
                <div class="dado-row">
                    <div class="dado-icon">${cfg.icon}</div>
                    <div class="dado-info"><strong>Tipo de Necessidade</strong><span>${condicao}</span></div>
                </div>
            </div>

            <div class="section-title">
                <i class="ti ti-chart-bar" style="color:#1565C0"></i> Meu Progresso
            </div>

            <div class="progress-section">
                <div class="progress-header">
                    <span>Progresso geral</span><span>${progresso}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width:0%"></div>
                </div>
            </div>

            <div class="section-title">
                <i class="ti ti-star" style="color:#1565C0"></i> Minhas Conquistas
            </div>

            <div class="cards-row">
                <div class="info-card">
                    <div class="card-icon">⭐</div>
                    <div class="card-valor">${nivel}</div>
                    <div class="card-label">Nível atual</div>
                </div>
                <div class="info-card">
                    <div class="card-icon">🏆</div>
                    <div class="card-valor">${pontos}</div>
                    <div class="card-label">Pontos</div>
                </div>
                <div class="info-card">
                    <div class="card-icon">📊</div>
                    <div class="card-valor">${progresso}%</div>
                    <div class="card-label">Progresso</div>
                </div>
                <!-- ✅ Card de condição/necessidade -->
                <div class="info-card">
                    <div class="card-icon">${cfg.icon}</div>
                    <div class="card-valor" style="font-size:15px;line-height:1.2">${condicao}</div>
                    <div class="card-label">Necessidade</div>
                </div>
            </div>

            <div class="section-title">
                <i class="ti ti-brain" style="color:#6A1B9A"></i> Nível de Suporte (Autismo)
            </div>

            <div class="dados-card">
                <div style="padding:16px 0;">
                    <strong style="color:#1565C0;display:block;margin-bottom:8px;font-size:16px">${descAutismo.titulo}</strong>
                    <span style="color:#546E7A;line-height:1.6;">${descAutismo.texto}</span>
                </div>
            </div>
        `;

        setTimeout(() => {
            const fill = document.querySelector(".progress-fill");
            if (fill) fill.style.width = progresso + "%";
        }, 100);
    }

    function sair() {
        localStorage.removeItem("usuario");
        window.location.href = "index.html";
    }

    carregarDadosAluno();
</script>
</body>
</html>

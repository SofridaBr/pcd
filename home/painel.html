<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Painel – EducaInclusiva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #F0F6FF;
            min-height: 100vh;
        }

        .topbar {
            background: #0D47A1;
            padding: 14px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #FFD600;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: #FFD600;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .logo-text {
            font-family: 'Fredoka One', cursive;
            color: #fff;
            font-size: 26px;
        }

        .logo-text span {
            color: #FFD600;
        }

        .btn-sair {
            background: #E53935;
            color: #fff;
            border: none;
            padding: 9px 20px;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-sair:hover {
            background: #B71C1C;
        }

        .hero {
            background: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
            margin: 28px 40px 0;
            border-radius: 24px;
            padding: 32px 36px;
            display: flex;
            align-items: center;
            gap: 24px;
            box-shadow: 0 8px 32px rgba(21, 101, 192, 0.18);
        }

        .hero-avatar {
            width: 72px;
            height: 72px;
            background: #FFD600;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            flex-shrink: 0;
        }

        .hero-info {
            flex: 1;
        }

        .hero-nome {
            font-family: 'Fredoka One', cursive;
            color: #fff;
            font-size: 28px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #FFD600;
            color: #0D47A1;
            font-weight: 800;
            font-size: 13px;
            padding: 4px 14px;
            border-radius: 20px;
            margin-top: 6px;
        }

        .hero-stats {
            display: flex;
            gap: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 16px 24px;
            text-align: center;
            min-width: 90px;
        }

        .stat-num {
            font-family: 'Fredoka One', cursive;
            color: #FFD600;
            font-size: 28px;
        }

        .stat-label {
            color: #BBDEFB;
            font-size: 12px;
            font-weight: 600;
        }

        .content {
            padding: 28px 40px 40px;
        }

        .section-title {
            font-family: 'Fredoka One', cursive;
            color: #1565C0;
            font-size: 22px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cards-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .info-card {
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 2px 16px rgba(21, 101, 192, 0.08);
            border: 2px solid #E3F2FD;
            text-align: center;
        }

        .info-card .card-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .info-card .card-valor {
            font-family: 'Fredoka One', cursive;
            color: #1565C0;
            font-size: 32px;
        }

        .info-card .card-label {
            color: #90A4AE;
            font-size: 13px;
            font-weight: 600;
            margin-top: 4px;
        }

        .progress-section {
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 2px 16px rgba(21, 101, 192, 0.08);
            border: 2px solid #E3F2FD;
            margin-bottom: 28px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 700;
            color: #1565C0;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 16px;
            background: #E3F2FD;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1565C0, #42A5F5);
            border-radius: 10px;
            transition: width 1s ease;
        }

        .badge-condicao {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 8px;
        }

        .badge-nenhuma {
            background: #E3F2FD;
            color: #1565C0;
        }

        .badge-visual {
            background: #FFEBEE;
            color: #C62828;
        }

        .badge-auditiva {
            background: #E8F5E9;
            color: #1B5E20;
        }

        .badge-cognitiva {
            background: #F3E5F5;
            color: #4A148C;
        }

        .badge-fisica {
            background: #EFEBE9;
            color: #3E2723;
        }

        .badge-outro {
            background: #FFF3E0;
            color: #E65100;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #1565C0;
            font-weight: 700;
            font-size: 16px;
        }

        .error-state {
            text-align: center;
            padding: 40px 20px;
            background: #FFEBEE;
            border-radius: 16px;
            color: #C62828;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .hero {
                margin: 16px;
                flex-direction: column;
            }

            .hero-stats {
                flex-wrap: wrap;
            }

            .content {
                padding: 16px;
            }

            .topbar {
                padding: 14px 20px;
            }
        }
    </style>
</head>

<body>

    <header class="topbar">
        <div class="topbar-left">
            <div class="logo-icon">🌟</div>
            <div class="logo-text">Educa<span>Inclusiva</span></div>
        </div>
        <button class="btn-sair" onclick="sair()">
            <i class="ti ti-logout"></i> Sair
        </button>
    </header>

    <div class="hero">
        <div class="hero-avatar">🧒</div>
        <div class="hero-info">
            <div class="hero-nome" id="hero-nome">Carregando...</div>
            <div id="hero-badge" class="hero-badge"><i class="ti ti-accessibility"></i> <span id="badge-texto">—</span>
            </div>
        </div>
        <div class="hero-stats">
            <div class="stat-box">
                <div class="stat-num" id="stat-nivel">—</div>
                <div class="stat-label">Nível</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="stat-pontos">—</div>
                <div class="stat-label">Pontos</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="stat-progresso">—</div>
                <div class="stat-label">Progresso</div>
            </div>
        </div>
    </div>

    <div class="content" id="conteudo-principal">
        <div class="loading-state">Carregando seus dados... ⏳</div>
    </div>

    <script>
        const usuarioLocal = JSON.parse(localStorage.getItem("usuario"));

        if (!usuarioLocal || usuarioLocal.tipo !== "aluno") {
            window.location.href = "index.html";
        }

        async function carregarDadosAluno() {
            try {
                const resposta = await fetch(`http://localhost:3000/aluno/${usuarioLocal.id}`);
                const dados = await resposta.json();

                if (!resposta.ok) {
                    mostrarErro("Não foi possível carregar seus dados. Tente novamente.");
                    return;
                }

                const aluno = dados.aluno;

                // Atualiza o localStorage com dados frescos do banco
                localStorage.setItem("usuario", JSON.stringify({ ...usuarioLocal, ...aluno }));

                renderizarPainel(aluno);

            } catch (erro) {
                // Fallback: usa dados do localStorage se o servidor estiver fora
                if (usuarioLocal.nome) {
                    renderizarPainel(usuarioLocal);
                } else {
                    mostrarErro("Sem conexão com o servidor. Faça login novamente.");
                }
            }
        }

        function renderizarPainel(aluno) {
            const condicao = aluno.condicao || "Nenhuma";
            const nivel = aluno.nivel || 1;
            const pontos = aluno.pontos || 0;
            const progresso = aluno.progresso || 0;

            // Hero
            document.getElementById("hero-nome").textContent = "Olá, " + aluno.nome + "! 👋";
            document.getElementById("badge-texto").textContent = condicao;

            const badgeEl = document.getElementById("hero-badge");
            badgeEl.className = "badge-condicao badge-" + condicao.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace("ã", "a").replace("í", "i");

            // Stats no hero
            document.getElementById("stat-nivel").textContent = "⭐ " + nivel;
            document.getElementById("stat-pontos").textContent = "🏆 " + pontos;
            document.getElementById("stat-progresso").textContent = progresso + "%";

            // Conteúdo principal
            const conteudo = document.getElementById("conteudo-principal");
            conteudo.innerHTML = `
        <div class="section-title">
          <i class="ti ti-chart-bar" style="color:#1565C0"></i> Meu Progresso
        </div>

        <div class="progress-section">
          <div class="progress-header">
            <span>Progresso geral</span>
            <span>${progresso}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progresso}%"></div>
          </div>
        </div>

        <div class="section-title" style="margin-top:8px">
          <i class="ti ti-star" style="color:#1565C0"></i> Minhas Conquistas
        </div>

        <div class="cards-row">
          <div class="info-card">
            <div class="card-icon">⭐</div>
            <div class="card-valor">${nivel}</div>
            <div class="card-label">Nível atual</div>
          </div>
          <div class="info-card">
            <div class="card-icon">🏆</div>
            <div class="card-valor">${pontos}</div>
            <div class="card-label">Pontos conquistados</div>
          </div>
          <div class="info-card">
            <div class="card-icon">📊</div>
            <div class="card-valor">${progresso}%</div>
            <div class="card-label">Progresso geral</div>
          </div>
          <div class="info-card">
            <div class="card-icon">♿</div>
            <div class="card-valor" style="font-size:18px">${condicao}</div>
            <div class="card-label">Condição registrada</div>
          </div>
        </div>
      `;

            // Anima a barra de progresso após render
            setTimeout(() => {
                const fill = document.querySelector(".progress-fill");
                if (fill) fill.style.width = progresso + "%";
            }, 100);
        }

        function mostrarErro(msg) {
            document.getElementById("conteudo-principal").innerHTML = `
        <div class="error-state">
          <i class="ti ti-wifi-off" style="font-size:48px;display:block;margin-bottom:12px"></i>
          ${msg}
        </div>
      `;
        }

        function sair() {
            localStorage.removeItem("usuario");
            window.location.href = "index.html";
        }

        carregarDadosAluno();
    </script>
</body>

</html>

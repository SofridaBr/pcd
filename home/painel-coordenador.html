<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Coordenador – EducaInclusiva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: #F0F6FF; min-height: 100vh; }

        .topbar {
            background: #0D47A1; padding: 14px 40px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 3px solid #FFD600;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width:44px;height:44px;background:#FFD600;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px; }
        .logo-text { font-family:'Fredoka One',cursive;color:#fff;font-size:26px; }
        .logo-text span { color:#FFD600; }
        .btn-sair { background:#E53935;color:#fff;border:none;padding:9px 20px;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.2s; }
        .btn-sair:hover { background:#B71C1C; }

        /* Hero coordenador - roxo institucional */
        .hero {
            background: linear-gradient(135deg, #6A1B9A 0%, #4A148C 100%);
            margin: 28px 40px 0; border-radius: 24px;
            padding: 32px 36px; display: flex; align-items: center; gap: 24px;
            box-shadow: 0 8px 32px rgba(106,27,154,0.25);
        }
        .hero-avatar { width:72px;height:72px;background:#FFD600;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0; }
        .hero-info { flex:1; }
        .hero-nome { font-family:'Fredoka One',cursive;color:#fff;font-size:26px; }
        .hero-badge { display:inline-flex;align-items:center;gap:6px;background:#FFD600;color:#4A148C;font-weight:800;font-size:13px;padding:4px 14px;border-radius:20px;margin-top:6px; }
        .hero-stats { display:flex;gap:16px;flex-wrap:wrap; }
        .stat-box { background:rgba(255,255,255,0.12);border-radius:16px;padding:16px 22px;text-align:center;min-width:88px; }
        .stat-num { font-family:'Fredoka One',cursive;color:#FFD600;font-size:26px; }
        .stat-label { color:#E1BEE7;font-size:12px;font-weight:600;margin-top:4px; }

        .content { padding: 28px 40px 40px; }
        .section-title { font-family:'Fredoka One',cursive;color:#1565C0;font-size:22px;margin-bottom:18px;display:flex;align-items:center;gap:10px; }

        /* Cards de estatísticas gerais */
        .stats-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px; }
        .stat-card { background:#fff;border-radius:20px;padding:24px;box-shadow:0 2px 16px rgba(21,101,192,0.08);border:2px solid #E3F2FD;text-align:center;transition:transform 0.2s; }
        .stat-card:hover { transform:translateY(-3px); }
        .stat-card-icon { font-size:36px;margin-bottom:10px; }
        .stat-card-num { font-family:'Fredoka One',cursive;color:#1565C0;font-size:32px; }
        .stat-card-label { color:#90A4AE;font-size:13px;font-weight:600;margin-top:4px; }

        /* Gráfico de condições */
        .chart-card { background:#fff;border-radius:20px;padding:24px;box-shadow:0 2px 16px rgba(21,101,192,0.08);border:2px solid #E3F2FD;margin-bottom:28px; }
        .chart-title { font-weight:800;color:#1565C0;font-size:16px;margin-bottom:20px;display:flex;align-items:center;gap:8px; }
        .condicao-row { display:flex;align-items:center;gap:14px;margin-bottom:14px; }
        .condicao-label { width:100px;font-size:13px;font-weight:700;color:#546E7A;flex-shrink:0;display:flex;align-items:center;gap:6px; }
        .condicao-bar-wrap { flex:1;background:#E3F2FD;border-radius:10px;height:14px;overflow:hidden; }
        .condicao-bar { height:100%;border-radius:10px;transition:width 1s ease; }
        .condicao-count { width:36px;text-align:right;font-weight:800;color:#1565C0;font-size:13px;flex-shrink:0; }

        /* Tabela de turmas */
        .table-card { background:#fff;border-radius:20px;padding:24px;box-shadow:0 2px 16px rgba(21,101,192,0.08);border:2px solid #E3F2FD;margin-bottom:28px; }
        .turma-row { display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid #F0F6FF; }
        .turma-row:last-child { border-bottom:none; }
        .turma-avatar { width:44px;height:44px;background:#E3F2FD;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0; }
        .turma-nome { font-weight:700;color:#1565C0;font-size:14px; }
        .turma-alunos { color:#90A4AE;font-size:12px;margin-top:2px; }
        .turma-prog { margin-left:auto;text-align:right; }
        .turma-prog-num { font-family:'Fredoka One',cursive;color:#1565C0;font-size:18px; }
        .turma-prog-label { color:#90A4AE;font-size:11px; }

        .empty { text-align:center;padding:40px 20px;color:#90A4AE; }
        .empty i { font-size:56px;margin-bottom:14px;display:block; }

        @media (max-width:768px) {
            .hero { margin:16px;flex-direction:column; }
            .content { padding:16px; }
            .topbar { padding:14px 20px; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-left">
        <div class="logo-icon">🌟</div>
        <div class="logo-text">Educa<span>Inclusiva</span></div>
    </div>
    <button class="btn-sair" onclick="sair()"><i class="ti ti-logout"></i> Sair</button>
</header>

<div class="hero">
    <div class="hero-avatar">🏫</div>
    <div class="hero-info">
        <div class="hero-nome" id="hero-nome">Carregando...</div>
        <div class="hero-badge"><i class="ti ti-building"></i> Coordenador(a)</div>
    </div>
    <div class="hero-stats">
        <div class="stat-box">
            <div class="stat-num" id="stat-alunos">—</div>
            <div class="stat-label">Total de alunos</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="stat-profs">—</div>
            <div class="stat-label">Educadores</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="stat-media">—</div>
            <div class="stat-label">Progresso médio</div>
        </div>
    </div>
</div>

<div class="content">

    <div class="section-title">
        <i class="ti ti-chart-dots" style="color:#6A1B9A"></i> Visão Geral da Escola
    </div>

    <div class="stats-grid" id="stats-grid">
        <div style="color:#1565C0;font-weight:700;text-align:center;padding:40px;grid-column:1/-1">Carregando... ⏳</div>
    </div>

    <div class="section-title">
        <i class="ti ti-chart-bar" style="color:#1565C0"></i> Alunos por Condição
    </div>

    <div class="chart-card" id="chart-card">
        <div class="chart-title"><i class="ti ti-accessibility"></i> Distribuição de Condições</div>
        <div id="condicoes-chart"></div>
    </div>

    <div class="section-title">
        <i class="ti ti-users" style="color:#2E7D32"></i> Turmas por Educador
    </div>

    <div class="table-card" id="turmas-container">
        <div style="color:#90A4AE;text-align:center;padding:30px">Carregando turmas...</div>
    </div>

</div>

<script>
    const usuario = JSON.parse(localStorage.getItem("usuario"));

    // ── VERIFICAÇÃO DE PERMISSÃO ──
    if (!usuario) {
        window.location.href = "index.html";
    } else if (usuario.tipo !== "coordenador") {
        // Redireciona para o painel correto
        const destinos = {
            aluno:       "painel.html",
            professor:   "painel-prof.html",
            responsavel: "painel-responsavel.html",
            apoio:       "painel-prof.html"
        };
        window.location.href = destinos[usuario.tipo] || "index.html";
    }

    document.getElementById("hero-nome").textContent = "Olá, " + usuario.nome + "! 🏫";

    const coresCondicao = {
        "Visual":    { bar: "#E53935", icon: "👁️" },
        "Auditiva":  { bar: "#2E7D32", icon: "👂" },
        "Cognitiva": { bar: "#6A1B9A", icon: "🧠" },
        "Fisica":    { bar: "#5D4037", icon: "♿" },
        "Nenhuma":   { bar: "#1565C0", icon: "✅" }
    };

    async function carregarEstatisticas() {
        try {
            const res   = await fetch("http://localhost:3000/escola/stats");
            const dados = await res.json();

            if (res.ok) {
                renderizarStats(dados);
            } else {
                usarDemoStats();
            }
        } catch (_) {
            usarDemoStats();
        }
    }

    function usarDemoStats() {
        renderizarStats({
            totalAlunos:      42,
            totalProfessores: 8,
            progressoMedio:   61,
            condicoes: { Visual: 9, Auditiva: 11, Cognitiva: 14, Fisica: 5, Nenhuma: 3 }
        });
        // aviso demo
        const aviso = document.createElement("div");
        aviso.style.cssText = "background:#FFF9C4;border-radius:12px;padding:12px 16px;color:#F57F17;font-weight:700;font-size:13px;margin-bottom:18px;";
        aviso.textContent = "⚠️ Servidor offline — exibindo dados de exemplo.";
        document.querySelector(".content").prepend(aviso);
    }

    function renderizarStats(dados) {
        // Hero
        document.getElementById("stat-alunos").textContent = dados.totalAlunos;
        document.getElementById("stat-profs").textContent  = dados.totalProfessores;
        document.getElementById("stat-media").textContent  = dados.progressoMedio + "%";

        // Cards
        document.getElementById("stats-grid").innerHTML = `
            <div class="stat-card">
                <div class="stat-card-icon">🎓</div>
                <div class="stat-card-num">${dados.totalAlunos}</div>
                <div class="stat-card-label">Alunos cadastrados</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">👨‍🏫</div>
                <div class="stat-card-num">${dados.totalProfessores}</div>
                <div class="stat-card-label">Educadores ativos</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">📊</div>
                <div class="stat-card-num">${dados.progressoMedio}%</div>
                <div class="stat-card-label">Progresso médio geral</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">🧩</div>
                <div class="stat-card-num">${Object.values(dados.condicoes || {}).reduce((a,b) => a + b, 0) - (dados.condicoes?.Nenhuma || 0)}</div>
                <div class="stat-card-label">Alunos com PCD</div>
            </div>
        `;

        // Gráfico de condições
        const totalCondicoes = Object.values(dados.condicoes || {}).reduce((a, b) => a + b, 0) || 1;
        const ordemCondicoes = ["Visual", "Auditiva", "Cognitiva", "Fisica", "Nenhuma"];
        const nomes = { Visual: "Visual", Auditiva: "Auditiva", Cognitiva: "Cognitiva", Fisica: "Física", Nenhuma: "Nenhuma" };

        document.getElementById("condicoes-chart").innerHTML = ordemCondicoes.map(c => {
            const qtd = dados.condicoes?.[c] || 0;
            const pct = Math.round((qtd / totalCondicoes) * 100);
            const cfg = coresCondicao[c] || { bar: "#90A4AE", icon: "⭐" };
            return `
            <div class="condicao-row">
                <div class="condicao-label">${cfg.icon} ${nomes[c]}</div>
                <div class="condicao-bar-wrap">
                    <div class="condicao-bar" data-w="${pct}" style="width:0%;background:${cfg.bar}"></div>
                </div>
                <div class="condicao-count">${qtd}</div>
            </div>`;
        }).join("");

        // Anima barras
        setTimeout(() => {
            document.querySelectorAll(".condicao-bar[data-w]").forEach(el => {
                el.style.width = el.getAttribute("data-w") + "%";
            });
        }, 100);
    }

    async function carregarTurmas() {
        try {
            const res   = await fetch("http://localhost:3000/escola/turmas");
            const dados = await res.json();

            if (res.ok && dados.turmas?.length > 0) {
                renderizarTurmas(dados.turmas);
            } else {
                renderizarTurmas([]);
            }
        } catch (_) {
            // Demo
            renderizarTurmas([
                { professor: "Prof. Maria Silva",    totalAlunos: 12, progressoMedio: 68 },
                { professor: "Prof. João Ferreira",  totalAlunos: 9,  progressoMedio: 54 },
                { professor: "Prof. Ana Rodrigues",  totalAlunos: 15, progressoMedio: 71 },
                { professor: "Apoio: Carlos Mendes", totalAlunos: 6,  progressoMedio: 45 }
            ]);
        }
    }

    function renderizarTurmas(turmas) {
        const container = document.getElementById("turmas-container");
        if (turmas.length === 0) {
            container.innerHTML = `<div class="empty"><i class="ti ti-user-off"></i><p>Nenhuma turma cadastrada ainda.</p></div>`;
            return;
        }
        container.innerHTML = turmas.map(t => `
            <div class="turma-row">
                <div class="turma-avatar">👨‍🏫</div>
                <div>
                    <div class="turma-nome">${t.professor}</div>
                    <div class="turma-alunos">${t.totalAlunos} aluno(s)</div>
                </div>
                <div class="turma-prog">
                    <div class="turma-prog-num">${Math.round(t.progressoMedio || 0)}%</div>
                    <div class="turma-prog-label">Progresso médio</div>
                </div>
            </div>
        `).join("");
    }

    function sair() {
        localStorage.removeItem("usuario");
        window.location.href = "index.html";
    }

    carregarEstatisticas();
    carregarTurmas();
</script>
</body>
</html>
